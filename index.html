<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>湯間庭町 駅前プロトタイプ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="768" height="512"></canvas>
        
        <div id="ui-layer">
            <div id="info-display">
                <span id="scene-name">駅前広場</span><br>
                <span id="coord-display">座標: (24, 22)</span>
            </div>
        </div>

        <div id="message-window"></div>
        <div id="menu-window"></div>

        <div id="scene-container"></div>

        <div id="mobile-controls">
            <div id="dpad">
                <button id="btn-up" class="dpad-btn up">▲</button>
                <button id="btn-left" class="dpad-btn left">◀</button>
                <button id="btn-right" class="dpad-btn right">▶</button>
                <button id="btn-down" class="dpad-btn down">▼</button>
            </div>
            <div id="action-btns">
                <button id="btn-action">調べる</button>
            </div>
        </div>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
